# Render Blueprint — deploy backend + frontend com um clique
# https://render.com/docs/blueprint-spec

services:
  # Backend (FastAPI + OpenCV)
  - type: web
    name: vectorizer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"

  # Frontend (React/Vite — static site)
  - type: web
    name: vectorizer-app
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://vectorizer-api-0xah.onrender.com"
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
